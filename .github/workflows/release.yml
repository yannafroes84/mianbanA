name: Release Deploy Assets

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, for example v2.0.8"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      target_commitish: ${{ steps.meta.outputs.target_commitish }}
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
    steps:
      - id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_tag="${{ github.event.inputs.release_tag }}"
          elif [[ "${GITHUB_REF_TYPE}" == "branch" ]]; then
            release_tag="main-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"
          else
            release_tag="${GITHUB_REF_NAME}"
          fi

          owner_lc="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          repo_lc="$(printf '%s' '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')"

          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "target_commitish=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "backend_image=ghcr.io/${owner_lc}/${repo_lc}-backend" >> "$GITHUB_OUTPUT"
          echo "frontend_image=ghcr.io/${owner_lc}/${repo_lc}-frontend" >> "$GITHUB_OUTPUT"

  build-backend:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./springboot-backend
          push: true
          tags: |
            ${{ needs.prepare.outputs.backend_image }}:${{ needs.prepare.outputs.release_tag }}
            ${{ needs.prepare.outputs.backend_image }}:latest

  build-frontend:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./vite-frontend
          push: true
          tags: |
            ${{ needs.prepare.outputs.frontend_image }}:${{ needs.prepare.outputs.release_tag }}
            ${{ needs.prepare.outputs.frontend_image }}:latest

  build-agent:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go-gost/go.mod
          cache-dependency-path: |
            go-gost/go.sum
            go-gost/x/go.sum
      - name: Build linux agent binaries
        shell: bash
        run: |
          mkdir -p dist
          pushd go-gost
          for arch in amd64 arm64; do
            GOOS=linux GOARCH="${arch}" CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o "../dist/gost-${arch}" .
          done
          popd
          sha256sum dist/gost-* > dist/SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: gost-binaries
          path: dist/*
          if-no-files-found: error

  release:
    needs:
      - prepare
      - build-backend
      - build-frontend
      - build-agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: gost-binaries
          path: dist
      - name: Write release body
        shell: bash
        run: |
          cat > release-body.md <<EOF
          Backend image: \`${{ needs.prepare.outputs.backend_image }}:${{ needs.prepare.outputs.release_tag }}\`
          Frontend image: \`${{ needs.prepare.outputs.frontend_image }}:${{ needs.prepare.outputs.release_tag }}\`

          Release assets:
          - docker-compose-v4.yml
          - docker-compose-v6.yml
          - panel_install.sh
          - install.sh
          - gost-amd64
          - gost-arm64
          - SHA256SUMS
          EOF
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          target_commitish: ${{ needs.prepare.outputs.target_commitish }}
          body_path: release-body.md
          make_latest: true
          files: |
            docker-compose-v4.yml
            docker-compose-v6.yml
            panel_install.sh
            install.sh
            dist/gost-amd64
            dist/gost-arm64
            dist/SHA256SUMS
